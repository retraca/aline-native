name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web (release)
        run: flutter build web --release --base-href /aline-native/

      - name: Copy SQLite WASM assets
        run: |
          DRIFT_VERSION=$(grep -A6 'name: drift$' pubspec.lock | grep 'version:' | head -1 | awk '{print $2}' | tr -d '"')
          WASM_SRC="$HOME/.pub-cache/hosted/pub.dev/drift-${DRIFT_VERSION}/extension/devtools/build/sqlite3.wasm"
          cp "$WASM_SRC" build/web/sqlite3.wasm
          dart compile js -O4 web/drift_worker.dart -o build/web/drift_worker.dart.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
