name: aline_native
description: "Aline — local-first kanban board and calendar."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.29

  # Navigation
  go_router: ^14.8.1

  # Calendar
  table_calendar: ^3.2.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.23.1
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
